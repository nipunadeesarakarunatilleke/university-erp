version: '3.8'

services:

  # ── Single MongoDB Cluster ──────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Kafka (KRaft — no Zookeeper) ────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - erp-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Auth Service ────────────────────────────────────────────────────────────
  auth-service:
    build: ./services/auth-service
    ports:
      - "3007:3007"
    environment:
      PORT: 3007
      MONGO_URI: mongodb://mongodb:27017/auth_db
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - erp-network
    restart: unless-stopped

  # ── Student Service ─────────────────────────────────────────────────────────
  student-service:
    build: ./services/student-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongodb:27017/students_db
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BROKER: kafka:9092
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - erp-network
    restart: unless-stopped

  # ── Exam Service ────────────────────────────────────────────────────────────
  exam-service:
    build: ./services/exam-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      MONGO_URI: mongodb://mongodb:27017/exams_db
      JWT_SECRET: ${JWT_SECRET}
      STUDENT_SERVICE_URL: http://student-service:3001
      KAFKA_BROKER: kafka:9092
    depends_on:
      mongodb:
        condition: service_healthy
      student-service:
        condition: service_started
    networks:
      - erp-network
    restart: unless-stopped

  # ── Result Service ──────────────────────────────────────────────────────────
  result-service:
    build: ./services/result-service
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      MONGO_URI: mongodb://mongodb:27017/results_db
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BROKER: kafka:9092
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - erp-network
    restart: unless-stopped

  # ── Transcript Service ───────────────────────────────────────────────────────
  transcript-service:
    build: ./services/transcript-service
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      MONGO_URI: mongodb://mongodb:27017/transcripts_db
      JWT_SECRET: ${JWT_SECRET}
      STUDENT_SERVICE_URL: http://student-service:3001
      RESULT_SERVICE_URL:  http://result-service:3004
    depends_on:
      mongodb:
        condition: service_healthy
      student-service:
        condition: service_started
      result-service:
        condition: service_started
    networks:
      - erp-network
    restart: unless-stopped

  # ── Notification Service ─────────────────────────────────────────────────────
  notification-service:
    build: ./services/notification-service
    ports:
      - "3006:3006"
    environment:
      PORT: 3006
      MONGO_URI: mongodb://mongodb:27017/notif_db
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BROKER: kafka:9092
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - erp-network
    restart: unless-stopped

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - erp-network
    depends_on:
      - student-service
      - exam-service
    restart: unless-stopped

networks:
  erp-network:
    driver: bridge

volumes:
  mongo-data:
  kafka-data:
  uploads-data:
